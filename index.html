<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qalaa Holdings — Framework Operations Tool</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f4;--surface:#fff;--surface2:#f1f0ed;--border:#e2e0db;--border2:#ccc;
  --text:#1a1a18;--text2:#555;--text3:#888;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-light:#B5D4F4;
  --green:#3B6D11;--green-bg:#EAF3DE;--green-light:#C0DD97;
  --amber:#854F0B;--amber-bg:#FAEEDA;--amber-light:#FAC775;
  --red:#A32D2D;--red-bg:#FCEBEB;--red-light:#F7C1C1;
  --purple:#3C3489;--purple-bg:#EEEDFE;--purple-light:#CECBF6;
  --teal:#0F6E56;--teal-bg:#E1F5EE;--teal-light:#9FE1CB;
  --radius:8px;--radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
a{color:var(--blue)}
button{cursor:pointer;font-family:inherit;font-size:13px}
input,select,textarea{font-family:inherit;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);padding:7px 10px;width:100%;outline:none;background:var(--surface);color:var(--text)}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;font-weight:500}
textarea{resize:vertical;min-height:70px}

/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:0}
.sidebar-logo{padding:20px 18px 14px;border-bottom:1px solid var(--border)}
.sidebar-logo h1{font-size:15px;font-weight:600;color:var(--text)}
.sidebar-logo p{font-size:11px;color:var(--text3);margin-top:2px}
.sidebar-nav{padding:10px 8px;flex:1}
.nav-section{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:10px 10px 4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:13px;border:none;background:none;width:100%;text-align:left;margin-bottom:1px}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--blue-bg);color:var(--blue);font-weight:500}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border)}
.role-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;padding:5px 10px;border-radius:20px;background:var(--purple-bg);color:var(--purple)}

.main{flex:1;overflow-x:hidden}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
.topbar h2{font-size:17px;font-weight:600}
.topbar-actions{display:flex;gap:8px;align-items:center}
.content{padding:24px 28px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap}
.btn:hover{background:var(--surface2)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:#0c447c}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{background:var(--red-bg);color:var(--red);border-color:var(--red-light)}
.btn-success{background:var(--green-bg);color:var(--green);border-color:var(--green-light)}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.card-sm{padding:14px 16px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface2);border-radius:var(--radius);padding:14px 16px}
.stat-label{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.stat-value{font-size:24px;font-weight:600;color:var(--text)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px;white-space:nowrap}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-purple{background:var(--purple-bg);color:var(--purple)}
.badge-teal{background:var(--teal-bg);color:var(--teal)}
.badge-gray{background:var(--surface2);color:var(--text2)}

/* Tables */
.table-wrap{overflow-x:auto;border-radius:var(--radius-lg);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;background:var(--surface)}
th{background:var(--surface2);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);padding:10px 14px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}

/* Forms */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{margin-bottom:14px}
.form-row{display:flex;gap:14px}
.form-row .form-group{flex:1}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);padding:24px;width:620px;max-width:95vw;max-height:90vh;overflow-y:auto;position:relative}
.modal h3{font-size:16px;font-weight:600;margin-bottom:18px}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;line-height:1}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* Tabs */
.tabs{display:flex;gap:2px;background:var(--surface2);border-radius:var(--radius);padding:3px;margin-bottom:20px;width:fit-content}
.tab{padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);border:none;background:none}
.tab.active{background:var(--surface);color:var(--text)}

/* Alerts */
.alert{padding:12px 16px;border-radius:var(--radius);font-size:13px;margin-bottom:16px;display:flex;align-items:flex-start;gap:10px}
.alert-amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-light)}
.alert-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-light)}
.alert-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-light)}
.alert-blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-light)}

/* Timeline */
.timeline{padding-left:24px;border-left:2px solid var(--border)}
.tl-item{position:relative;padding-bottom:16px;padding-left:16px}
.tl-dot{position:absolute;left:-25px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--blue);border:2px solid var(--surface)}
.tl-date{font-size:11px;color:var(--text3)}
.tl-text{font-size:13px;color:var(--text);margin-top:2px}

/* Fine calc */
.fine-display{background:var(--red-bg);border:1px solid var(--red-light);border-radius:var(--radius);padding:14px;text-align:center}
.fine-amount{font-size:28px;font-weight:700;color:var(--red)}
.fine-label{font-size:12px;color:var(--red);margin-top:4px}

/* Progress bar */
.progress{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:3px;background:var(--blue)}

/* Search */
.search-bar{display:flex;gap:8px;align-items:center;margin-bottom:18px}
.search-bar input{max-width:280px}
.search-bar select{max-width:160px}

/* Empty state */
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty svg{width:40px;height:40px;opacity:.3;margin:0 auto 12px;display:block}

/* Role selector */
.role-selector{padding:20px;border-bottom:1px solid var(--border)}
.role-selector label{font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:600;text-transform:uppercase}
.role-selector select{font-size:12px}

/* Notification dot */
.notif-dot{width:7px;height:7px;background:#e24b4a;border-radius:50%;display:inline-block;margin-left:auto}

/* Responsive tweaks */
@media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr)}.sidebar{width:190px;min-width:190px}}
</style>
</head>

<script>
// ── API CONFIG ────────────────────────────────────────────────────────────
const API_URL = 'https://script.google.com/macros/s/AKfycbwnCXMjKnS6F8TJ05kdtpD-5EElmmtCkwRCueKup_7mtcKhWdF_XW5Vacce4NrDEQfp/exec';

async function apiRead(sheet) {
  const url = `${API_URL}?action=read&sheet=${sheet}&t=${Date.now()}`;
  const r = await fetch(url);
  const j = await r.json();
  return j.rows || [];
}

async function apiWrite(sheet, data) {
  const url = `${API_URL}?action=write&sheet=${sheet}&data=${encodeURIComponent(JSON.stringify(data))}`;
  const r = await fetch(url);
  return await r.json();
}

async function apiUpdate(sheet, id, data) {
  const url = `${API_URL}?action=update&sheet=${sheet}&id=${encodeURIComponent(id)}&data=${encodeURIComponent(JSON.stringify(data))}`;
  const r = await fetch(url);
  return await r.json();
}

async function apiInit() {
  const url = `${API_URL}?action=init`;
  const r = await fetch(url);
  return await r.json();
}

function showLoader(msg) {
  let el = document.getElementById('globalLoader');
  if (!el) {
    el = document.createElement('div');
    el.id = 'globalLoader';
    el.style.cssText = 'position:fixed;top:0;left:0;right:0;background:var(--blue);color:#fff;text-align:center;padding:10px;font-size:13px;font-weight:500;z-index:999;transition:opacity .3s';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = '1';
  el.style.display = 'block';
}

function hideLoader() {
  const el = document.getElementById('globalLoader');
  if (el) { el.style.opacity = '0'; setTimeout(() => el.style.display='none', 300); }
}

function showError(msg) {
  const el = document.getElementById('globalLoader');
  if (el) {
    el.style.background = 'var(--red)';
    el.textContent = '⚠ ' + msg;
    el.style.opacity = '1';
    el.style.display = 'block';
    setTimeout(() => { el.style.background='var(--blue)'; hideLoader(); }, 4000);
  }
}

// ── DATA ──────────────────────────────────────────────────────────────────
const COMPANIES = [
  "Asec Engineering","Asec Automation ASA","ARESCO","ASCOM","United for Foundries UCF",
  "GlassRock","OSTOOL","NPM","Taqa Gas","Taqa Power","Taqa Petroleum",
  "Taqa Water","Dina Farms","ERC","ACCM","Qalaa","GP Business Development"
];

// ── CONTACTS (editable per company) ───────────────────────────────────────
let CONTACTS_RAW = [];
const CONTACTS = {
  "Asec Engineering":        {name:'',phone:'',email:''},
  "Asec Automation ASA":     {name:'',phone:'',email:''},
  "ARESCO":                  {name:'',phone:'',email:''},
  "ASCOM":                   {name:'',phone:'',email:''},

  "OSTOOL":                  {name:'',phone:'',email:''},

  "Taqa Power":              {name:'',phone:'',email:''},
  "Taqa Petroleum":          {name:'',phone:'',email:''},
  "Taqa Water":              {name:'',phone:'',email:''},
  "Dina Farms":              {name:'',phone:'',email:''},
  "ERC":                     {name:'',phone:'',email:''},
  "ACCM":                    {name:'',phone:'',email:''},
  "Qalaa":                   {name:'',phone:'',email:''},
  "GP Business Development": {name:'',phone:'',email:''},
};

// ── DUES REGISTER ────────────────────────────────────────────────────────
let DUES = [];

function getContact(co){
  const c = CONTACTS_RAW.find(r=>r.company===co);
  return c || {name:'',phone:'',email:''};
}

// ── BD DIRECTOR (always notified) ─────────────────────────────────────────
const BD_DIRECTOR = {
  name:  'Hossam Negm',
  email: 'hossam.negm@asec-holding.com',
  phone: '+201222845454'
};
const TOOL_URL = 'https://qalaaholdings.github.io/qalaa-framework/';

function waLink(phone,msg){
  const clean=phone.replace(/\D/g,'');
  return `https://wa.me/${clean}?text=${encodeURIComponent(msg)}`;
}

function notifyPanel(companies, subject, msgBody){
  if(!companies||companies.length===0) return '';

  // Always include BD Director row
  const bdEmailBtn=`<a href="mailto:${BD_DIRECTOR.email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(msgBody)}" class="btn btn-sm" style="text-decoration:none" title="Email ${BD_DIRECTOR.name}"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg> Email</a>`;
  const bdWABtn=`<a href="${waLink(BD_DIRECTOR.phone,msgBody)}" target="_blank" class="btn btn-sm" style="text-decoration:none;background:var(--purple-bg);color:var(--purple);border-color:var(--purple-light)" title="WhatsApp ${BD_DIRECTOR.name}"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg> WhatsApp</a>`;
  const bdRow=`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--blue-light);background:var(--purple-bg);margin:0 -14px;padding-left:14px;padding-right:14px">
    <span style="font-size:12px;font-weight:600;color:var(--purple)">★ ${BD_DIRECTOR.name} <span style="font-weight:400;color:var(--purple);opacity:.7">— Group BD Director</span></span>
    <div style="display:flex;gap:6px">${bdEmailBtn}${bdWABtn}</div>
  </div>`;

  const rows=companies.filter(Boolean).map(co=>{
    const c=getContact(co);
    const hasEmail=c.email&&c.email.trim();
    const hasPhone=c.phone&&c.phone.trim();
    const nameTag=c.name?` <span style="color:var(--text3);font-weight:400">— ${c.name}</span>`:'';
    const eBtn=hasEmail
      ?`<a href="mailto:${c.email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(msgBody)}" class="btn btn-sm" style="text-decoration:none"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg> Email</a>`
      :`<span class="btn btn-sm" style="opacity:.35;cursor:not-allowed" title="No email set for ${co}"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg> Email</span>`;
    const wBtn=hasPhone
      ?`<a href="${waLink(c.phone,msgBody)}" target="_blank" class="btn btn-sm" style="text-decoration:none;background:var(--green-bg);color:var(--green);border-color:var(--green-light)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg> WhatsApp</a>`

function today(){ return new Date().toISOString().split('T')[0] }
function fmt(n){ return 'EGP '+n.toLocaleString() }
function fmtDate(d){ if(!d) return '—'; const dt=new Date(d); return dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) }
function daysDiff(d){ const ms=new Date()-new Date(d); return Math.floor(ms/86400000) }

function calcFine(amount, dueDate){
  if(!dueDate) return 0;
  const days = daysDiff(dueDate);
  if(days<=0) return 0;
  const daily=amount*0.0005;
  const fine=Math.min(daily*days, amount*0.10);
  return Math.round(fine);
}

function getStatusBadge(s){
  const map={
    'Pending approval':'<span class="badge badge-amber">Pending approval</span>',
    'approved':'<span class="badge badge-blue">Approved</span>',
    'In negotiation':'<span class="badge badge-blue">In negotiation</span>',
    'Secured':'<span class="badge badge-green">Secured</span>',
    'Completed':'<span class="badge badge-green">Completed</span>',
    'Rejected':'<span class="badge badge-red">Rejected</span>',
    'In progress':'<span class="badge badge-teal">In progress</span>',
    'Pending response':'<span class="badge badge-amber">Pending response</span>',
    'Overdue':'<span class="badge badge-red">Overdue</span>',
    'Paid':'<span class="badge badge-green">Paid</span>',
  };
  return map[s]||`<span class="badge badge-gray">${s}</span>`;
}

  const steps=[['Submitted',total,100],['Approved',approved,Math.round(approved/total*100)],['In negotiation',neg,Math.round(neg/total*100)],['Secured',sec,Math.round(sec/total*100)]];
  return steps.map(([label,count,pct])=>`

function renderTopReferrers(){

async function approveReferral(id){
  const r=REFERRALS.find(x=>x.id===id);
  if(!r) return;
  r.referralStatus='approved'; r.status=r.status==='Pending approval'?'In negotiation':r.status;
  showLoader('Saving…'); await apiUpdate('Referrals', r.id, r); hideLoader();
  const subject=`Qalaa Framework — Referral ${r.id} Approved`;
  const msg=`Dear Contact,\n\nReferral ${r.id} for the opportunity with ${r.client} has been APPROVED by the Group BD Director.\n\nReferring company: ${r.referring}\nReceiving company: ${r.receiving}\nEstimated value: ${fmt(r.value)}\n\nThe receiving company may now proceed with the opportunity.\n\nAccess the Framework tool here:\n👉 https://qalaaholdings.github.io/qalaa-framework/\n\nQalaa Holdings — Group Business Development`;
  closeModal();
  openModal(`<h3>Referral ${r.id} — Approved</h3>
    <div class="alert alert-green"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>Referral approved. Notify the companies below.</div>
    ${notifyPanel([r.referring,r.receiving],subject,msg)}
    <div class="modal-footer"><button class="btn btn-primary" onclick="closeModal();renderApprovals()">Done</button></div>`);
  showToast('Referral approved');
}
async function rejectReferral(id){
  const r=REFERRALS.find(x=>x.id===id);
  if(!r) return;
  r.referralStatus='rejected'; r.status='Rejected';

function renderPayments(){
  document.getElementById('topbarActions').innerHTML='';
  const payable=REFERRALS.filter(r=>r.status==='Secured'&&r.collected>0);

  const rows=payable.map(r=>{
    const incentive=Math.round(r.collected*0.005);
    const outstanding=incentive-r.incentivePaid;
    const fine=outstanding>0&&r.paymentDue?calcFine(outstanding,r.paymentDue):0;
    const overdue=outstanding>0&&r.paymentDue&&daysDiff(r.paymentDue)>0;
    const statusLabel=outstanding<=0?'Paid':overdue?'Overdue':'Due';
    return `<tr>
      <td><strong>${r.id}</strong><br><span style="font-size:12px;color:var(--text3)">${r.client}</span></td>
      <td>${r.referring}</td>
      <td>${r.receiving}</td>
      <td>${fmt(r.collected)}</td>
      <td><strong>${fmt(incentive)}</strong></td>
      <td>${fmt(r.incentivePaid)}</td>
      <td style="color:${outstanding>0?'var(--red)':'var(--green)'}"><strong>${fmt(outstanding)}</strong></td>
      <td>${fmtDate(r.paymentDue)}</td>
      <td>${getStatusBadge(statusLabel)}${currentRole==='keeper'&&outstanding>0?`<br><button class="btn btn-sm" style="margin-top:4px" onclick="markPaid('${r.id}')">Mark paid</button>`:''}</td>
    </tr>`;
  }).join('');

  const totalIncentive=Math.round(payable.reduce((a,r)=>a+r.collected*0.005,0));
  const totalPaid=payable.reduce((a,r)=>a+r.incentivePaid,0);
  const totalOutstanding=totalIncentive-totalPaid;
  const totalFines=payable.reduce((a,r)=>{
    const out=Math.round(r.collected*0.005)-r.incentivePaid;
    return a+(out>0&&r.paymentDue?calcFine(out,r.paymentDue):0);
  },0);

  document.getElementById('mainContent').innerHTML=`
    <div class="stats-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="stat-card"><div class="stat-label">Total incentives due</div><div class="stat-value" style="font-size:18px">${fmt(totalIncentive)}</div></div>
      <div class="stat-card"><div class="stat-label">Paid</div><div class="stat-value" style="font-size:18px;color:var(--green)">${fmt(totalPaid)}</div></div>
      <div class="stat-card"><div class="stat-label">Outstanding</div><div class="stat-value" style="font-size:18px;color:var(--amber)">${fmt(totalOutstanding)}</div></div>

    </div>

    <div class="table-wrap">
      <table>
        <thead><tr><th>Referral</th><th>Referring</th><th>Receiving</th><th>Collected</th><th>Incentive (0.5%)</th><th>Paid</th><th>Outstanding</th><th>Due date</th><th>Status</th></tr></thead>
        <tbody>${rows||'<tr><td colspan="10" style="text-align:center;color:var(--text3);padding:24px">No secured business yet</td></tr>'}</tbody>
      </table>
    </div>
  `;
}

function dueStatusBadge(s){
  const map={
    'Pending response':'<span class="badge badge-amber">Pending response</span>',
    'Acknowledged':'<span class="badge badge-blue">Acknowledged</span>',
    'Disputed':'<span class="badge badge-red">Disputed</span>',
    'Partially settled':'<span class="badge badge-teal">Partially settled</span>',
    'Fully settled':'<span class="badge badge-green">Fully settled</span>',
  };
  return map[s]||`<span class="badge badge-gray">${s}</span>`;
}

  const isKeeper=currentRole==='keeper';
  document.getElementById('topbarActions').innerHTML=`<button class="btn btn-primary btn-sm" onclick="openNewDueModal()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Register overdue</button>`;

  // Filter based on role
  const visibleDues = isKeeper ? DUES : DUES.filter(d => {
    // Companies only see dues where they are creditor or debtor
    // Since we don't have a logged-in company, show all for now with role note
    return true;
  });

  const totalDues=DUES.reduce((a,d)=>a+(d.amount-d.settled),0);
  const totalOverdue=DUES.filter(d=>d.status!=='Fully settled'&&daysDiff(d.dueDate)>0).reduce((a,d)=>a+(d.amount-d.settled),0);
  const totalFines=DUES.filter(d=>d.status!=='Fully settled').reduce((a,d)=>{
    const out=d.amount-d.settled;
    return a+(daysDiff(d.dueDate)>0?calcFine(out,d.dueDate):0);
  },0);
  const pending=DUES.filter(d=>d.status==='Pending response').length;
  const disputed=DUES.filter(d=>d.status==='Disputed').length;

  const rows=visibleDues.map(d=>{
    const outstanding=d.amount-d.settled;
    const overdueDays=Math.max(0,daysDiff(d.dueDate));
    const fine=d.status!=='Fully settled'&&overdueDays>0?calcFine(outstanding,d.dueDate):0;
    return `<tr>
      <td><span style="font-size:11px;color:var(--text3)">${d.id}</span><br><strong>${d.creditor}</strong><br><span style="font-size:11px;color:var(--text3)">owed by</span><br><strong style="color:var(--red)">${d.debtor}</strong></td>
      <td style="font-size:12px">${d.desc}</td>
      <td style="font-size:12px">${fmt(d.amount)}</td>
      <td style="font-size:12px;color:var(--green)">${d.settled>0?fmt(d.settled):'—'}</td>

      <td>${dueStatusBadge(d.status)}</td>
      <td><button class="btn btn-sm" onclick="viewDue('${d.id}')">View</button></td>
    </tr>`;
  }).join('');

  document.getElementById('mainContent').innerHTML=`
    ${pending>0?`<div class="alert alert-amber" style="margin-bottom:16px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><div><strong>${pending} overdue(s)</strong> are awaiting a response from the debtor company.</div></div>`:''}

async function respondDue(id, responseType){
  const d=DUES.find(x=>x.id===id);
  if(!d) return;
  const response=document.getElementById('dueResponse').value.trim();
  if(!response){ showToast('Please enter your response first','error'); return; }
  d.status=responseType;
  d.debtorResponse=response;
  showLoader('Saving…'); await apiUpdate('Dues', d.id, d); hideLoader();
  closeModal(); renderDues(); showToast(`Response recorded — marked as ${responseType}`);
}

async function settleDue(id){
  const d=DUES.find(x=>x.id===id);
  if(!d) return;
  const amt=parseFloat(document.getElementById('dueSettleAmt').value)||0;
  const date=document.getElementById('dueSettleDate').value;
  if(!amt){ showToast('Please enter settlement amount','error'); return; }
  d.settled=Math.min(parseFloat(d.settled)+amt, parseFloat(d.amount));
  d.settlementDate=date;
  if(d.settled>=parseFloat(d.amount)){ d.status='Fully settled'; }
  else { d.status='Partially settled'; }
  showLoader('Saving…'); await apiUpdate('Dues', d.id, d); hideLoader();
  closeModal(); renderDues(); showToast('Settlement recorded');
}

async function submitNewDue(){
  const creditor=document.getElementById('ndCreditor').value;
  const debtor=document.getElementById('ndDebtor').value;
  const desc=document.getElementById('ndDesc').value.trim();
  const amount=parseFloat(document.getElementById('ndAmount').value)||0;
  const dueDate=document.getElementById('ndDueDate').value;
  const settled=parseFloat(document.getElementById('ndSettled').value)||0;
  if(!desc||!amount||!dueDate){ showToast('Please fill all fields','error'); return; }
  if(creditor===debtor){ showToast('Creditor and debtor must be different companies','error'); return; }
  const id=`OVD-${String(DUES.length+1).padStart(3,'0')}`;
  const newDue={id,creditor,debtor,desc,amount:parseFloat(amount),dueDate,registeredBy:currentRole==='keeper'?'keeper':'creditor',registeredDate:today(),status:'Pending response',debtorResponse:'',settlementDate:'',settled:parseFloat(settled)||0};
  showLoader('Saving due…');
  await apiWrite('Dues', newDue);
  DUES.push(newDue);
  hideLoader();
  const subject=`Qalaa Framework — New Overdue Registered: ${id}`;
  const msg=`Dear Contact,\n\nA new outstanding overdue has been formally registered in the Qalaa Group Framework.\n\nOverdue ID: ${id}\nCreditor (owed money): ${creditor}\nDebtor (owes money): ${debtor}\nDescription: ${desc}\nAmount: EGP ${amount.toLocaleString()}\nOriginal due date: ${dueDate}\n\nThe debtor company is requested to acknowledge or raise a concern within 5 working days.\n\n👉 https://qalaaholdings.github.io/qalaa-framework/\n\nQalaa Holdings — Group Business Development`;
  closeModal();
  openModal(`<h3>Overdue Registered — ${id}</h3>
    <div class="alert alert-blue"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>Due registered. Notify both companies below.</div>
    ${notifyPanel([creditor,debtor],subject,msg)}
    <div class="modal-footer"><button class="btn btn-primary" onclick="closeModal();renderDues()">Done</button></div>`);
  showToast('Due registered successfully');
}

function exportXLSX(){
  const wb=XLSX.utils.book_new();

  const refData=REFERRALS.map(r=>({
    'Referral ID':r.id,'Date':r.date,'Referring Company':r.referring,'Receiving Company':r.receiving,
    'Client':r.client,'Description':r.desc,'Estimated Value':r.value,'Status':r.status,
    'Secured Amount':r.secured,'Collected Amount':r.collected,
    'Incentive Due (0.5%)':Math.round(r.collected*0.005),'Incentive Paid':r.incentivePaid,
    'Outstanding':Math.round(r.collected*0.005)-r.incentivePaid,'Payment Due Date':r.paymentDue||''
  }));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(refData),'Referrals');

  const payData=REFERRALS.filter(r=>r.collected>0).map(r=>{
    const inc=Math.round(r.collected*0.005);
    const out=inc-r.incentivePaid;
    const fine=out>0&&r.paymentDue?calcFine(out,r.paymentDue):0;
    return {'Referral ID':r.id,'Client':r.client,'Referring':r.referring,'Receiving':r.receiving,
      'Collected':r.collected,'Incentive Due':inc,'Incentive Paid':r.incentivePaid,'Outstanding':out,
      'Payment Due':r.paymentDue||'','Fine Accrued':fine,'Days Overdue':r.paymentDue?Math.max(0,daysDiff(r.paymentDue)):0};
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(payData),'Incentive Payments');

  const srcData=SOURCING.map(s=>({'ID':s.id,'Date':s.date,'Buyer':s.buyer,'Provider':s.provider,
    'Service':s.service,'Value':s.value,'Response Deadline':s.responseDeadline,'Status':s.status}));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(srcData),'Intra-Group Sourcing');

  const coData=COMPANIES.map(c=>({
    'Company':c,'Referrals Sent':REFERRALS.filter(r=>r.referring===c).length,
    'Referrals Received':REFERRALS.filter(r=>r.receiving===c).length,
    'Sourcing as Buyer':SOURCING.filter(s=>s.buyer===c).length,
    'Sourcing as Provider':SOURCING.filter(s=>s.provider===c).length
  }));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(coData),'Companies');

  const duesData=DUES.map(d=>({
    'Due ID':d.id,'Creditor':d.creditor,'Debtor':d.debtor,'Description':d.desc,
    'Amount':d.amount,'Settled':d.settled,'Outstanding':d.amount-d.settled,
    'Due Date':d.dueDate,'Days Overdue':Math.max(0,daysDiff(d.dueDate)),
    'Fine Accrued':d.status!=='Fully settled'&&daysDiff(d.dueDate)>0?calcFine(d.amount-d.settled,d.dueDate):0,
    'Status':d.status,'Debtor Response':d.debtorResponse,'Registered By':d.registeredBy,'Registered Date':d.registeredDate
  }));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(duesData),'Group Overdue');

  XLSX.writeFile(wb,`Qalaa_Framework_Report_${today()}.xlsx`);
  showToast('Excel report downloaded');
}

function openNewStoryModal(){
  const coOpts=COMPANIES.map(c=>`<option>${c}</option>`).join('');
  openModal(`
    <h3>Add success story</h3>
    <p style="font-size:13px;color:var(--text2);margin-bottom:18px">Share a win with the Group — a new client, a cross-sell, or a great collaboration between companies.</p>
    <div class="form-group"><label>Story title</label><input type="text" id="nsTitle" placeholder="e.g. ARESCO wins EGP 5M contract through Asec Engineering referral"></div>
    <div class="form-row">
      <div class="form-group"><label>Reporting company</label><select id="nsCompany">${coOpts}</select></div>
      <div class="form-group"><label>Partner company (if any)</label><select id="nsPartner"><option value="">— None —</option>${coOpts}</select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Story type</label>
        <select id="nsType">
          <option>Cross-sell</option>
          <option>Intra-group sourcing</option>
          <option>New client</option>
          <option>Cost saving</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group"><label>Date</label><input type="date" id="nsDate" value="${today()}"></div>
    </div>
    <div class="form-group"><label>Value generated (EGP) — optional</label><input type="number" id="nsValue" placeholder="0"></div>
    <div class="form-group"><label>Tell the story</label><textarea id="nsStory" style="min-height:100px" placeholder="What happened? How did the collaboration work? What was the outcome?"></textarea></div>
    <div class="form-group"><label>Key lesson or takeaway — optional</label><input type="text" id="nsLesson" placeholder="e.g. Early involvement of logistics team saved 3 weeks of delays"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitStory()">Share story</button>
    </div>
  `);
}

async function submitStory(){
  const title=document.getElementById('nsTitle').value.trim();
  const company=document.getElementById('nsCompany').value;
  const partner=document.getElementById('nsPartner').value;
  const type=document.getElementById('nsType').value;
  const date=document.getElementById('nsDate').value;
  const value=parseFloat(document.getElementById('nsValue').value)||0;
  const story=document.getElementById('nsStory').value.trim();
  const lesson=document.getElementById('nsLesson').value.trim();
  if(!title||!story){ showToast('Please fill in the title and story','error'); return; }
  const id=`STR-${String(STORIES.length+1).padStart(3,'0')}`;
  const newStory={id,title,company,partnerCompany:partner,type,date,value,story,lesson,registeredDate:today()};
  showLoader('Saving story…');
  await apiWrite('Stories', newStory);
  STORIES.push(newStory);
  hideLoader();
  const subject=`Qalaa Framework — New Success Story: ${title}`;
  const msg=`Dear Contact,\n\nA new success story has been shared on the Qalaa Group Framework!\n\nTitle: ${title}\nType: ${type}\nCompany: ${company}${partner?'\nPartner: '+partner:''}${value>0?'\nValue generated: '+fmt(value):''}\n\nStory:\n${story}${lesson?'\n\nKey lesson: '+lesson:''}\n\n👉 https://qalaaholdings.github.io/qalaa-framework/\n\nQalaa Holdings — Group Business Development`;
  closeModal();
  openModal(`<h3>Story Shared! 🌟</h3>
    <div class="alert alert-green"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>Success story saved. Notify the companies below.</div>
    ${notifyPanel([company,partner].filter(Boolean),subject,msg)}
    <div class="modal-footer"><button class="btn btn-primary" onclick="closeModal();renderStories()">Done</button></div>`);
  showToast('Success story shared with the Group!');
}

// ── INIT ──────────────────────────────────────────────────────────────────
let STORIES = [];

async function loadAllData() {
  showLoader('Connecting to database…');
  try {
    // Initialize headers first
    await apiInit();

    showLoader('Loading referrals…');
    const refs = await apiRead('Referrals');
    REFERRALS = refs.map(r=>({
      ...r,
      value: parseFloat(r.value)||0,
      secured: parseFloat(r.secured)||0,
      collected: parseFloat(r.collected)||0,
      incentivePaid: parseFloat(r.incentivePaid)||0,
    }));

    showLoader('Loading sourcing requests…');
    const srcs = await apiRead('Sourcing');
    SOURCING = srcs.map(s=>({...s, value: parseFloat(s.value)||0}));

    showLoader('Loading dues…');
    const dues = await apiRead('Dues');
    DUES = dues.map(d=>({
      ...d,
      amount: parseFloat(d.amount)||0,
      settled: parseFloat(d.settled)||0,
    }));

    showLoader('Loading contacts…');
    CONTACTS_RAW = await apiRead('Contacts');

    showLoader('Loading success stories…');
    STORIES = await apiRead('Stories');

    hideLoader();
    updateNotifDots();
    renderDashboard();
  } catch(err) {
    showError('Could not connect to database. Check your internet connection.');
    console.error(err);
    // Fallback to empty state
    hideLoader();
    updateNotifDots();
    renderDashboard();
  }
}

loadAllData();
</script>
